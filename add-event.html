<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect - Add Event</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="add-event.html">Add Event</a>
            <a href="my-registrations.html">My Registrations</a>
            <button id="dark-mode-toggle">
                    🌙 Dark Mode
                </button>
        </nav>
    </header>

    <main>

        <div class="form-container">

            <h1>Add New Event</h1>

            <form id="add-event-form">

                <div class="form-group">
                    <label for="event-name">Event Name</label>
                    <input
                        type="text"
                        id="event-name"
                        placeholder="Enter event name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="category">Category</label>

                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Fest">Fest</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Sports">Sports</option>
                        <option value="Club">Club</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="time">Time</label>
                    <input type="time" id="time" required>
                </div>

                <div class="form-group">
                    <label for="venue">Venue</label>
                    <input
                        type="text"
                        id="venue"
                        placeholder="Enter venue"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="description">Description</label>

                    <textarea
                        id="description"
                        rows="5"
                        placeholder="Enter event description"
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="organiser-name">
                        Organiser Name
                    </label>

                    <input
                        type="text"
                        id="organiser-name"
                        placeholder="Enter organiser name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">
                        Organiser Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter organiser email"
                        required
                    >
                </div>

                <button type="submit">
                    Submit Event
                </button>

            </form>

        </div>

    </main>

    <footer>
        <p>CampusConnect | Developed by Ravi</p>
    </footer>

    <script src="js/app.js"></script>

</body>
</html>
